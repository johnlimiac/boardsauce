  <style>
    /* ── Pill bar that replaces the old game-screen header ────── */
    .flip-pill-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 8px 12px;
      background: var(--card-body);
      border-bottom: 2px solid var(--border);
      flex-shrink: 0;
    }

    .flip-pill {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 6px 14px;
      border-radius: 999px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.65rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.15s, border-color 0.15s;
      background: var(--surface);
      border: 2px solid var(--border);
      color: var(--muted);
    }

    .flip-pill:hover { background: #e4ddc8; border-color: #a8a080; }

    .flip-pill-danger {
      color: #991b1b;
      border-color: #fca5a5;
      background: #fef2f2;
    }
    .flip-pill-danger:hover { background: #fee2e2; border-color: #f87171; }

    #mode-title {
      font-family: 'Bebas Neue', cursive;
      font-size: 1.35rem;
      color: var(--text);
      line-height: 1;
      text-align: center;
      flex: 1;
    }

    /* Remove safe-area top padding from old header — nav handles it now */
    .header { display: none !important; }
  </style>
</head>
<body>

<!-- ── Shared Nav ── -->

      <a href="yahtzee.html">Yahtzee</a>
        <a href="farkle.html">Farkle</a>
    </div>
    <button class="tl-hamburger" onclick="toggleNav()" aria-label="Toggle navigation menu" aria-expanded="false">
      <svg class="tl-icon-open" width="20" height="14" viewBox="0 0 20 14" fill="none" aria-hidden="true">
        <rect width="20" height="2" rx="1" fill="currentColor"/>
        <rect y="6" width="20" height="2" rx="1" fill="currentColor"/>
        <rect y="12" width="20" height="2" rx="1" fill="currentColor"/>
      </svg>
      <svg class="tl-icon-close" width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
        <path d="M1 1l14 14M15 1L1 15" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      </svg>
    </button>

  <div class="tl-mobile-menu" role="menu">

    <a href="flip7.html" class="active" role="menuitem" aria-current="page">Flip 7</a>
    <a href="yahtzee.html" role="menuitem">Yahtzee</a>
    <a href="farkle.html" role="menuitem">Farkle</a>
  </div>
</nav>

<div class="content-width">
  <div class="fireworks-layer">
    <div class="firework"></div>
    <div class="firework"></div>
    <div class="firework"></div>
    <div class="firework"></div>
    <div class="firework"></div>
  </div>

  <div id="setup-screen">
    <h1>FLIP 7</h1>
    <div class="mode-grid">
      <div class="mode-btn selected" id="m-f7" onclick="setMode('flip7')">FLIP 7</div>
      <div class="mode-btn" id="m-vg" onclick="setMode('vengeance')">VENGEANCE</div>
      <div class="mode-btn" id="m-bo" onclick="setMode('combo')">COMBO</div>
    </div>

    <div id="neg-toggle-container" style="display:none; margin-bottom: 15px;">
      <label style="font-weight: bold; font-size: 0.9rem; color: var(--muted);">
        <input type="checkbox" id="opt-negatives"> Allow Negative Scores
      </label>
    </div>

    <div id="player-list">
      <div class="player-row"><input type="text" value="Player 1"></div>
      <div class="player-row"><input type="text" value="Player 2"></div>
    </div>
    <button class="add-player-link" onclick="addPlayerRow()">+ Add Another Player</button>
    <button class="primary-btn" style="margin-top:auto;" onclick="start()">START SESSION</button>
  </div>

  <div id="game-screen">
    <!-- Pill bar replaces the old sticky header -->
    <div class="flip-pill-bar">
      <button class="flip-pill" onclick="goHome()" aria-label="Back to game modes">
        ← Game Modes
      </button>
      <h2 id="mode-title">FLIP 7</h2>
      <button class="flip-pill flip-pill-danger" onclick="restartGame(true)" aria-label="Start new game">
        New Game
      </button>
    </div>

    <div class="round-indicator">RD <span id="rd-num">1</span></div>

    <div class="game-body">
    <div class="table-container">
      <table id="score-table">
        <thead><tr id="th-row"></tr></thead>
        <tbody id="tb-body"></tbody>
      </table>
    </div>

    <div class="controls">
      <button id="live-save-btn" onclick="endRound()">SAVE ROUND & RESET</button>
      <div class="current-info">
        <div>
          <div class="active-name" id="display-name">---</div>
          <div style="font-size: 0.65rem; color: var(--accent-blue); text-transform: uppercase;" id="edit-context">Live Round</div>
        </div>
        <div id="display-score" class="active-score">0</div>
      </div>
      <div class="grid" id="num-grid"></div>
      <div class="mods-container" id="mod-container"></div>
      <div class="actions">
        <button class="btn-action bust" onclick="doAction('bust')">BUST 💥</button>
        <button class="btn-action stay" onclick="doAction('stay')">STAY ✓</button>
      </div>
    </div>
    </div><!-- /.game-body -->
  </div>
</div>

<!-- Flip 7 overlay -->
<div id="f7-overlay" aria-hidden="true">
  <div class="f7-ov-card">7</div>
  <div class="f7-ov-text">FLIP 7!</div>
  <div class="f7-ov-sub">Seven cards — +15 bonus!</div>
</div>

<script src="../js/nav.js"></script>
<script src="../js/app.js"></script>
</body>
</html>

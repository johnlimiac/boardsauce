<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Yahtzee — Board Sauce</title>

  <meta name="apple-mobile-web-app-title" content="Yahtzee Scorecard">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="../icon-512.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="../css/styles.css">
  <link rel="stylesheet" href="../css/nav.css">
  <link rel="stylesheet" href="../css/yahtzee.css">
</head>
<body>

<!-- ══════════════════════════════════════════════
     SETUP SCREEN
═══════════════════════════════════════════════ -->
<div id="setup-screen">

  <nav class="tl-nav" aria-label="Main navigation">
    <div class="tl-nav-inner">
      <a href="../index.html" class="tl-logo" aria-label="Board Sauce Home">Board Sauce</a>
      <div class="tl-nav-links">
        <a href="../index.html">Home</a>
        <a href="flip7.html">Flip 7</a>
        <a href="yahtzee.html" class="active" aria-current="page">Yahtzee</a>
        <a href="farkle.html">Farkle</a>
      </div>
      <button class="tl-hamburger" onclick="toggleNav()" aria-label="Toggle navigation menu" aria-expanded="false">
        <svg class="tl-icon-open" width="20" height="14" viewBox="0 0 20 14" fill="none" aria-hidden="true">
          <rect width="20" height="2" rx="1" fill="currentColor"/>
          <rect y="6" width="20" height="2" rx="1" fill="currentColor"/>
          <rect y="12" width="20" height="2" rx="1" fill="currentColor"/>
        </svg>
        <svg class="tl-icon-close" width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
          <path d="M1 1l14 14M15 1L1 15" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </button>
    </div>
    <div class="tl-mobile-menu" role="menu">
      <a href="../index.html" role="menuitem">Home</a>
      <a href="flip7.html" role="menuitem">Flip 7</a>
      <a href="yahtzee.html" class="active" role="menuitem" aria-current="page">Yahtzee</a>
      <a href="farkle.html" role="menuitem">Farkle</a>
    </div>
  </nav>

  <div class="setup-body">

    <div class="setup-dice" aria-hidden="true">
      <svg width="72" height="72" viewBox="0 0 72 72" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="4" y="4" width="64" height="64" rx="14"
          fill="#fef2f2" stroke="#b91c1c" stroke-width="3"/>
        <circle cx="22" cy="22" r="5.5" fill="#b91c1c"/>
        <circle cx="50" cy="22" r="5.5" fill="#b91c1c"/>
        <circle cx="36" cy="36" r="5.5" fill="#b91c1c"/>
        <circle cx="22" cy="50" r="5.5" fill="#b91c1c"/>
        <circle cx="50" cy="50" r="5.5" fill="#b91c1c"/>
      </svg>
    </div>

    <h1 class="setup-title">Yahtzee</h1>
    <p class="setup-sub">Classic Dice Scoring Game</p>

    <p class="setup-section-label">Players</p>

    <div id="player-list">
      <div class="yah-player-row">
        <input class="yah-input" type="text" value="Player 1" autocomplete="off" aria-label="Player 1 name">
      </div>
      <div class="yah-player-row">
        <input class="yah-input" type="text" value="Player 2" autocomplete="off" aria-label="Player 2 name">
        <button class="yah-del-btn" onclick="this.parentElement.remove()" aria-label="Remove player">×</button>
      </div>
    </div>

    <button class="add-player-btn" onclick="addPlayer()">+ Add Another Player</button>

    <button class="yah-start-btn" onclick="startGame()">START GAME</button>

  </div>
</div>

<!-- ══════════════════════════════════════════════
     GAME SCREEN
═══════════════════════════════════════════════ -->
<div id="game-screen">

  <nav class="tl-nav" aria-label="Main navigation">
    <div class="tl-nav-inner">
      <a href="../index.html" class="tl-logo" aria-label="Board Sauce Home">Board Sauce</a>
      <div class="tl-nav-links">
        <a href="../index.html">Home</a>
        <a href="flip7.html">Flip 7</a>
        <a href="yahtzee.html" class="active" aria-current="page">Yahtzee</a>
        <a href="farkle.html">Farkle</a>
      </div>
      <button class="tl-hamburger" onclick="toggleNav()" aria-label="Toggle navigation menu" aria-expanded="false">
        <svg class="tl-icon-open" width="20" height="14" viewBox="0 0 20 14" fill="none" aria-hidden="true">
          <rect width="20" height="2" rx="1" fill="currentColor"/>
          <rect y="6" width="20" height="2" rx="1" fill="currentColor"/>
          <rect y="12" width="20" height="2" rx="1" fill="currentColor"/>
        </svg>
        <svg class="tl-icon-close" width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
          <path d="M1 1l14 14M15 1L1 15" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </button>
    </div>
    <div class="tl-mobile-menu" role="menu">
      <a href="../index.html" role="menuitem">Home</a>
      <a href="flip7.html" role="menuitem">Flip 7</a>
      <a href="yahtzee.html" class="active" role="menuitem" aria-current="page">Yahtzee</a>
      <a href="farkle.html" role="menuitem">Farkle</a>
    </div>
  </nav>

  <div class="game-ctrl-bar">
    <span class="game-status">● In Progress</span>
    <button class="new-game-btn" onclick="newGame()">New Game</button>
  </div>

  <div class="score-area" role="region" aria-label="Scorecard">
    <div class="score-table-wrap">
      <table id="score-table" role="grid" aria-label="Yahtzee scorecard"></table>
    </div>
  </div>

</div>

<!-- ══════════════════════════════════════════════
     SCORE PICKER
═══════════════════════════════════════════════ -->
<div id="picker-overlay" class="picker-overlay" onclick="closePicker()" aria-hidden="true"></div>

<div id="picker-panel" class="picker-panel" role="dialog" aria-modal="true" aria-label="Score picker">
  <div class="picker-handle" aria-hidden="true"></div>
  <div id="picker-content"></div>
</div>

<!-- Yahtzee overlay -->
<div id="yah-overlay" aria-hidden="true">
  <div class="yah-ov-dice">🎲🎲🎲🎲🎲</div>
  <div class="yah-ov-text">YAHTZEE!</div>
  <div class="yah-ov-sub">Five of a kind!</div>
</div>

<script src="../js/nav.js"></script>
<script src="../js/yahtzee.js"></script>
</body>
</html>
